<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Défis à jetons</title>
<style>
body{font-family:Arial;background:white;margin:0}
#defis{display:grid;grid-template-columns:repeat(2,180px);gap:20px;padding:30px}
.case{border:2px solid #ddd;border-radius:20px;padding:20px;text-align:center;cursor:pointer}
.locked{filter:blur(2px);opacity:.7}
.cadenas{width:60px;height:50px;background:#2ecc71;border-radius:10px;margin:10px auto;position:relative}
.cadenas:before{content:"";position:absolute;width:35px;height:30px;border:8px solid #2ecc71;border-bottom:none;border-radius:20px 20px 0 0;top:-30px;left:5px}
.ouvert:before{transform:rotate(-35deg);transform-origin:left bottom}
.trou{width:12px;height:18px;background:white;border-radius:50%;position:absolute;top:15px;left:24px}
#boite{position:fixed;right:20px;bottom:20px;width:180px;border:6px solid #2ecc71;border-radius:20px;padding:15px;text-align:center}
#piece{width:40px;height:40px;background:#2ecc71;border-radius:50%;margin:10px auto;cursor:grab}
#monnayeur{position:fixed;right:70px;top:20px;width:80px;height:80px;border:5px solid #2ecc71;border-radius:10px;text-align:center;padding-top:20px}
#quiz{display:none;padding:20px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center}
#modal{background:white;padding:20px;border-radius:20px}
button{padding:10px 20px;border:none;border-radius:10px}
.oui{background:#2ecc71;color:white}
a{
    color:#2ecc71;
}
</style>
</head>
<body>
<p>Ma chaine youteub:</p>
<a href="https://www.youtube.com/@jaajzoz"
target="_blank">Jaajzoz</a>
<div id="monnayeur">Monnayeur</div>

<div id="defis"></div>

<div id="quiz"></div>

<div id="boite">
<h3>Boîte à jetons</h3>
<div id="piece"></div>
<div>Jetons : <span id="nb"></span>/5</div>
<div id="temps"></div>
</div>

<div id="overlay">
<div id="modal">
<p>Voulez-vous réinitialiser le site ?</p>
<button onclick="overlay.style.display='none'">Non</button>
<button class="oui" onclick="resetSite()">Oui</button>
</div>
</div>

<script>
let jetons = Number(localStorage.jetons ?? 5);
const DELAI_JETON = 60 * 1000; 
let prochainJeton = localStorage.prochainJeton
    ? Number(localStorage.prochainJeton)
    : Date.now() + DELAI_JETON;
let defis=JSON.parse(localStorage.defis||'[true,false,false,false]');
let monnaie=false;

const data=[
[
{q:"Quelle est la capitale de la France ?",multi:false,rep:1,choix:["Lyon","Paris","Marseille"]},
{q:"Combien y a-t-il de continents ?",multi:false,rep:2,choix:["5","6","7"]},
{q:"Quelle planète est la plus proche du Soleil ?",multi:false,rep:0,choix:["Mercure","Vénus","Mars"]},
{q:"Combien font 8 × 7 ?",multi:false,rep:1,choix:["54","56","64"]},
{q:"Quel est le symbole de l'eau ?",multi:false,rep:1,choix:["HO","H2O","O2"]},
{q:"Qui a peint la Joconde ?",multi:false,rep:0,choix:["Léonard de Vinci","Picasso","Van Gogh"]},
{q:"Quel est le plus grand océan ?",multi:false,rep:1,choix:["Atlantique","Pacifique","Indien"]},
{q:"Quelle couleur donne bleu + jaune ?",multi:false,rep:0,choix:["Vert","Orange","Violet"]},
{q:"Quel animal est le roi de la jungle ?",multi:false,rep:2,choix:["Éléphant","Tigre","Lion"]},
{q:"Combien de jours dans une semaine ?",multi:false,rep:2,choix:["5","6","7"]}
],
[
{q:"Quelle est la capitale de l'Espagne ?",multi:false,rep:2,choix:["Barcelone","Valence","Madrid"]},
{q:"Combien de côtés possède un hexagone ?",multi:false,rep:1,choix:["5","6","8"]},
{q:"Quel est le plus grand mammifère ?",multi:false,rep:0,choix:["Baleine bleue","Éléphant","Girafe"]},
{q:"Quel langage sert à styliser une page web ?",multi:false,rep:2,choix:["HTML","Python","CSS"]},
{q:"Combien font 15 + 28 ?",multi:false,rep:1,choix:["42","43","44"]},
{q:"Quel pays est célèbre pour les pyramides ?",multi:false,rep:0,choix:["Égypte","Italie","Chine"]},
{q:"Quel gaz respirons-nous ?",multi:false,rep:2,choix:["Hydrogène","Hélium","Oxygène"]},
{q:"Combien de mois dans une année ?",multi:false,rep:1,choix:["10","12","14"]},
{q:"Quel est l'animal le plus rapide ?",multi:false,rep:0,choix:["Guépard","Lion","Cheval"]},
{q:"Qui a inventé l'ampoule ?",multi:false,rep:2,choix:["Newton","Einstein","Edison"]}
],
[
{q:"Quel est le plus long fleuve du monde ?",multi:false,rep:1,choix:["Amazone","Nil","Loire"]},
{q:"Combien font 9 × 9 ?",multi:false,rep:2,choix:["72","80","81"]},
{q:"Quelle planète est rouge ?",multi:false,rep:0,choix:["Mars","Jupiter","Saturne"]},
{q:"Quel est le plus grand pays ?",multi:false,rep:1,choix:["Canada","Russie","Chine"]},
{q:"Combien de minutes dans une heure ?",multi:false,rep:2,choix:["30","50","60"]},
{q:"Quel métal précieux est jaune ?",multi:false,rep:0,choix:["Or","Argent","Cuivre"]},
{q:"Quel navigateur est développé par Google ?",multi:false,rep:1,choix:["Firefox","Chrome","Safari"]},
{q:"Quelle langue est la plus parlée ?",multi:false,rep:2,choix:["Français","Anglais","Mandarin"]},
{q:"100 ÷ 4 ?",multi:false,rep:0,choix:["25","20","40"]},
{q:"Satellite naturel de la Terre ?",multi:false,rep:1,choix:["Mars","Lune","Soleil"]}
],
[
{q:"Quel est le plus haut sommet ?",multi:false,rep:2,choix:["Mont Blanc","K2","Everest"]},
{q:"12 × 12 ?",multi:false,rep:0,choix:["144","124","132"]},
{q:"Capitale de l'Italie ?",multi:false,rep:1,choix:["Milan","Rome","Venise"]},
{q:"Quel organe pompe le sang ?",multi:false,rep:2,choix:["Poumon","Foie","Cœur"]},
{q:"Plus grand désert chaud ?",multi:false,rep:0,choix:["Sahara","Gobi","Atacama"]},
{q:"Langage principal des pages web ?",multi:false,rep:1,choix:["Python","HTML","C++"]},
{q:"Combien de secondes dans une minute ?",multi:false,rep:2,choix:["30","50","60"]},
{q:"Le Brésil est sur quel continent ?",multi:false,rep:0,choix:["Amérique du Sud","Europe","Afrique"]},
{q:"Plus grand animal terrestre ?",multi:false,rep:1,choix:["Girafe","Éléphant","Rhinocéros"]},
{q:"Nombre de joueurs au football ?",multi:false,rep:2,choix:["9","10","11"]}
]
];

function save(){
localStorage.jetons = jetons;
localStorage.defis = JSON.stringify(defis);
localStorage.prochainJeton = prochainJeton; 
}

function afficher(){
document.getElementById('nb').textContent=jetons;
let html='';
defis.forEach((o,i)=>{
html+=`<div class="case ${o?'':'locked'}" onclick="ouvrir(${i})">
<div class="cadenas ${i==0||o?'ouvert':''}"><div class="trou"></div></div>
<h3>Défis ${i+1}</h3></div>`;
});
document.getElementById('defis').innerHTML=html;
}
function ouvrir(i){
if(!defis[i]||!monnaie)return;
let q='<h2>Défi '+(i+1)+'</h2><form id=f>';
data[i].forEach((e,n)=>{
q+=`<p>${e.q}</p>`;
e.choix.forEach((c,j)=>{
q+=`<label><input type="${e.multi?'checkbox':'radio'}" name="q${n}" value="${j}">${c}</label><br>`;
});
});
q+='<button type="button" onclick="corriger('+i+')">Valider</button></form>';
quiz.innerHTML=q; quiz.style.display='block';
}
function corriger(i){
let score=0;
data[i].forEach((e,n)=>{
let v=document.querySelector('input[name=q'+n+']:checked');
if(v&&+v.value===e.rep)score++;
});
alert('Score : '+score+'/10');
monnaie=false;
if(score>=5){
if(i<3)defis[i+1]=true;
alert('Défi réussi !');
}else alert('Échec : il faudra remettre un jeton.');
save(); afficher(); quiz.style.display='none';
}
const piece=document.getElementById('piece');
const monnayeur=document.getElementById('monnayeur');

piece.draggable=true;

piece.addEventListener('dragstart',e=>{
e.dataTransfer.setData('text','jeton');
});

monnayeur.addEventListener('dragover',e=>e.preventDefault());

monnayeur.addEventListener('drop',e=>{
e.preventDefault();

if(monnaie){
alert('Un jeton est déjà inséré !');
return;
}

if(jetons<=0){
alert('Plus de jetons !');
return;
}

jetons--;
monnaie=true;
alert('Jeton inséré !');
save();
afficher();
});

function resetSite(){
jetons=2;
defis=[true,false,false,false];
monnaie=false;
save(); afficher();
overlay.style.display='none';
prochainJeton = Date.now() + DELAI_JETON;
}

document.addEventListener('keydown',e=>{
if(e.ctrlKey&&e.code==='Space'){
e.preventDefault();
overlay.style.display='flex';
}
});

function timer(){
 let maintenant = Date.now();

    if(maintenant >= prochainJeton){

        if(jetons < 5){
            jetons++;
        }

        prochainJeton = maintenant + DELAI_JETON;
        save();
        afficher();
    }

    let reste = prochainJeton - maintenant;

    let min = Math.floor(reste / 60000);
    let sec = Math.floor((reste % 60000) / 1000);

    temps.textContent =
        `Prochain jeton dans ${String(min).padStart(2,'0')}min ${String(sec).padStart(2,'0')}s`;
}
setInterval(timer,1000);
timer();
console.log(defis);
console.log(jetons);
afficher();
</script>
</body>
</html>
